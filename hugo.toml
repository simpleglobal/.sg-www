baseURL = 'https://new.simplemotion.global/'
title = 'SimpleGlobal'
theme = 'simpleglobal'

defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageCode = 'en-au'
    languageName = 'English'
    weight = 1
    [languages.en.params]
      description = 'Globally Engineered, Locally Delivered.'
      tagline = 'Globally Engineered, Locally Delivered.'
      email = 'info@simplemotion.global'
      phone = '+61 2 9737 9844'
      address = '20-22 Hampstead Road, Auburn NSW, Australia'
      [languages.en.params.products]
        [languages.en.params.products.simplicity_one]
          name = 'Simplicity One'
          repo = 'simplemotion/simplicity-one'
          description = 'Single-axis motion controller for theatrical automation.'
        [languages.en.params.products.simplicity_two]
          name = 'Simplicity Two'
          repo = 'simplemotion/simplicity-two'
          description = 'Multi-axis motion control system for complex stage machinery.'
    [[languages.en.menus.main]]
      name = 'Architecture'
      url = '/architecture/'
      weight = 1
    [[languages.en.menus.main]]
      name = 'Entertainment'
      url = '/entertainment/'
      weight = 2
    [[languages.en.menus.main]]
      name = 'Industry'
      url = '/industry/'
      weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
