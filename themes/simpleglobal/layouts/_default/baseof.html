<!DOCTYPE html>
<html lang="{{ .Site.Language.LanguageCode | default .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="icon" type="image/x-icon" href="/img/favicons/sg-blue/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicons/sg-blue/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicons/sg-blue/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/img/favicons/sg-blue/favicon-512x512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/img/favicons/sg-blue/favicon-180x180.png">
  <link rel="preload" href="/fonts/NotoSans-Variable.woff2" as="font" type="font/woff2" crossorigin>
  {{ if eq .Site.Language.Lang "ko" }}<link rel="preload" href="/fonts/NotoSansKR-Variable.woff2" as="font" type="font/woff2" crossorigin>
  {{ else if eq .Site.Language.Lang "ja" }}<link rel="preload" href="/fonts/NotoSansJP-Variable.woff2" as="font" type="font/woff2" crossorigin>
  {{ else if eq .Site.Language.Lang "zh-hk" }}<link rel="preload" href="/fonts/NotoSansTC-Variable.woff2" as="font" type="font/woff2" crossorigin>
  {{ end }}
  <link rel="stylesheet" href="/css/main.css?v={{ now.Unix }}">
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
