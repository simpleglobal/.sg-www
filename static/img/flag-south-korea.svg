<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <clipPath id="circle">
    <circle cx="32" cy="32" r="30"/>
  </clipPath>
  <circle cx="32" cy="32" r="30" fill="#ffffff"/>
  <g clip-path="url(#circle)">
    <!-- Taeguk (yin-yang) -->
    <circle cx="32" cy="32" r="12" fill="#C60C30"/>
    <path d="M32,20 A12,12 0 0,1 32,44 A6,6 0 0,1 32,32 A6,6 0 0,0 32,20" fill="#003478"/>
    <!-- Trigrams (simplified bars) -->
    <!-- Top-left -->
    <g transform="translate(32,32) rotate(-60)">
      <rect x="16" y="-6" width="10" height="2" fill="#000"/>
      <rect x="16" y="-2" width="10" height="2" fill="#000"/>
      <rect x="16" y="2" width="10" height="2" fill="#000"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(32,32) rotate(-120)">
      <rect x="16" y="-6" width="4" height="2" fill="#000"/>
      <rect x="22" y="-6" width="4" height="2" fill="#000"/>
      <rect x="16" y="-2" width="10" height="2" fill="#000"/>
      <rect x="16" y="2" width="4" height="2" fill="#000"/>
      <rect x="22" y="2" width="4" height="2" fill="#000"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(32,32) rotate(120)">
      <rect x="16" y="-6" width="10" height="2" fill="#000"/>
      <rect x="16" y="-2" width="4" height="2" fill="#000"/>
      <rect x="22" y="-2" width="4" height="2" fill="#000"/>
      <rect x="16" y="2" width="10" height="2" fill="#000"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(32,32) rotate(60)">
      <rect x="16" y="-6" width="4" height="2" fill="#000"/>
      <rect x="22" y="-6" width="4" height="2" fill="#000"/>
      <rect x="16" y="-2" width="4" height="2" fill="#000"/>
      <rect x="22" y="-2" width="4" height="2" fill="#000"/>
      <rect x="16" y="2" width="4" height="2" fill="#000"/>
      <rect x="22" y="2" width="4" height="2" fill="#000"/>
    </g>
  </g>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#1a1a1a" stroke-width="1"/>
</svg>
